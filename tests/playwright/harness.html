<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>rive-harness</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0f172a;
      }
      #canvas {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script src="rive.min.js"></script>
    <script>
      window.__RIVE_OK = false;
      window.__RIVE_ERROR = "";
      rive.RuntimeLoader.setWasmUrl("rive.wasm");

      const params = new URLSearchParams(window.location.search);
      const file = params.get("file");
      const artboard = params.get("artboard");
      if (!file) {
        window.__RIVE_ERROR = "missing file query param";
      } else {
        try {
          const opts = {
            src: file,
            canvas: document.getElementById("canvas"),
            autoplay: true,
            onLoad: () => {
              window.__RIVE_OK = true;
            },
            onLoadError: (error) => {
              window.__RIVE_ERROR = String(error || "rive load error");
            },
          };
          if (artboard) {
            opts.artboard = artboard;
          }
          new rive.Rive(opts);
        } catch (error) {
          window.__RIVE_ERROR = String(error || "rive init error");
        }
      }
    </script>
  </body>
</html>
